<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1A6D7C">
<title>黃金海岸・布里斯本 ｜ 5 Day Travel Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">

<style>
:root{
  --washi:#FAF6EE; --washi-deep:#F1E9D8; --paper:#FFFFFF;
  --ink:#152830; --ink-soft:#3A4B53; --ink-mute:#7B8990;
  --line:#E2DACA; --line-soft:#EFE7D5;
  --shu:#1A6D7C; --shu-deep:#114E5A;
  --kincha:#D2613F; --matcha:#6B8E5C;
  --info-fg:#2D5F8F; --info-bg:#EBF1F8; --info-bd:#C8DBEB;
  --warn-fg:#A06318; --warn-bg:#FBEFD9; --warn-bd:#EFD9A3;
  --ok-fg:#3D7A5C;   --ok-bg:#E5F0E8;   --ok-bd:#C1DCC9;
  --danger-fg:#A4422A;--danger-bg:#F8E2DA;--danger-bd:#EFC6B5;
  --shadow-1:0 1px 2px rgba(21,40,48,.05),0 4px 12px rgba(21,40,48,.05);
  --shadow-2:0 4px 24px rgba(21,40,48,.10);
  --radius:12px; --radius-sm:6px;
  --serif:'Noto Serif',Georgia,'Times New Roman',serif;
  --sans:'Noto Sans TC','Hiragino Sans','PingFang TC',-apple-system,sans-serif;
  --display:'Playfair Display','Noto Serif',serif;
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:80px}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
body{margin:0;background:var(--washi);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.75;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
::selection{background:rgba(26,109,124,.18);color:var(--shu-deep)}

/* ───── Top Nav ───── */
nav.top{
  position:sticky;top:0;z-index:50;background:rgba(250,246,238,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
nav.top .row{
  max-width:1200px;margin:0 auto;padding:14px 22px;
  display:flex;align-items:center;justify-content:space-between;gap:18px;
}
nav.top .brand{
  font-family:var(--serif);font-weight:600;font-size:16px;letter-spacing:.06em;color:var(--ink);
  display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;
}
nav.top .brand .dot{
  display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--shu);
}
nav.top .links{display:flex;gap:4px;flex-wrap:wrap}
nav.top .links a{
  font-size:14px;padding:8px 14px;color:var(--ink-soft);text-decoration:none;
  border-radius:999px;cursor:pointer;transition:background .2s,color .2s;letter-spacing:.04em;
}
nav.top .links a:hover{background:var(--washi-deep);color:var(--shu)}
nav.top .links a.active{background:var(--shu);color:#fff}
nav.top .links a:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
@media (max-width:760px){
  nav.top .row{padding:10px 14px;flex-direction:column;align-items:flex-start;gap:8px}
  nav.top .links{width:100%;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  nav.top .links a{flex-shrink:0;font-size:13px;padding:6px 12px}
}

/* ───── Hero ───── */
.hero{
  position:relative;min-height:88vh;display:flex;align-items:center;justify-content:center;
  text-align:center;color:#fff;overflow:hidden;
  background-color:#0E2A33;
}
.hero .bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;
  filter:brightness(.55) saturate(1.08);transform:scale(1.05);transition:opacity 1s ease;opacity:0}
.hero .bg.loaded{opacity:1}
.hero::after{
  content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 0%,rgba(0,0,0,.55) 100%),
             linear-gradient(180deg,rgba(0,0,0,.1) 0%,rgba(0,0,0,.5) 100%);
}
.hero .inner{position:relative;z-index:2;padding:24px;max-width:840px}
.hero .eyebrow{
  font-family:var(--display);font-style:italic;font-size:14px;letter-spacing:.28em;
  color:#F2D4B3;text-transform:uppercase;margin:0 0 18px;opacity:.9
}
.hero h1{
  font-family:var(--serif);font-weight:600;letter-spacing:.06em;
  font-size:clamp(40px,7vw,84px);margin:0 0 8px;line-height:1.05;
  text-shadow:0 2px 20px rgba(0,0,0,.4);
}
.hero h1 .jp{display:block;font-size:.32em;font-weight:500;letter-spacing:.4em;margin-top:14px;opacity:.85;color:#F4E6D0}
.hero .rule{display:inline-block;width:80px;height:1px;background:#F2D4B3;margin:28px 0;opacity:.6}
.hero .dates{font-family:var(--display);font-size:clamp(18px,2.4vw,24px);letter-spacing:.08em;opacity:.95}
.hero .meta{display:flex;flex-wrap:wrap;gap:12px 20px;justify-content:center;margin-top:24px;font-size:13px;opacity:.85}
.hero .meta span{display:inline-flex;align-items:center;gap:8px;letter-spacing:.04em}
.hero .meta span::before{content:"";width:5px;height:5px;border-radius:50%;background:#F2D4B3}
.hero .scroll-hint{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:2;
  color:#F4E6D0;opacity:.7;font-size:12px;letter-spacing:.25em;text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.hero .scroll-hint .arrow{width:1px;height:36px;background:#F4E6D0;animation:drop 2.2s ease-in-out infinite}
@keyframes drop{0%,100%{transform:scaleY(.4) translateY(-12px);opacity:.2}50%{transform:scaleY(1) translateY(0);opacity:.9}}

/* ───── Section Container ───── */
section.page{padding:72px 24px 96px}
section.page .wrap{max-width:1100px;margin:0 auto}
section.page .head{text-align:center;margin-bottom:48px}
section.page .head .kicker{
  font-family:var(--display);font-style:italic;font-size:13px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--shu);margin:0 0 8px
}
section.page .head h2{
  font-family:var(--serif);font-weight:600;font-size:clamp(28px,4vw,40px);margin:0;letter-spacing:.04em;color:var(--ink)
}
section.page .head .desc{color:var(--ink-mute);margin-top:10px;font-size:14px}
section.page .head .rule{display:inline-block;width:48px;height:1px;background:var(--shu);margin:18px 0 0}

/* ───── Day Timeline ───── */
.timeline{display:grid;gap:32px}
.day-card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow-1);transition:transform .3s ease, box-shadow .3s ease;
  display:grid;grid-template-columns:minmax(0,1fr) 1.2fr;
}
.day-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2)}
@media (max-width:780px){.day-card{grid-template-columns:1fr}}

.day-card .gallery{
  position:relative;min-height:280px;background:var(--washi-deep);overflow:hidden;
}
.day-card .gallery .slide{
  position:absolute;inset:0;background-size:cover;background-position:center;
  background-color:var(--washi-deep);opacity:0;transition:opacity .9s ease;
}
.day-card .gallery .slide.active{opacity:1}
.day-card .gallery .cap{
  position:absolute;left:14px;bottom:14px;z-index:2;
  padding:5px 12px;background:rgba(21,40,48,.6);color:#fff;
  font-size:12px;letter-spacing:.05em;border-radius:999px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  pointer-events:none;font-weight:500;transition:opacity .3s;
}
.day-card .gallery .dots{
  position:absolute;right:14px;bottom:14px;z-index:2;display:flex;gap:6px;
}
.day-card .gallery .dots .dot{
  width:8px;height:8px;border-radius:50%;border:none;padding:0;
  background:rgba(255,255,255,.45);cursor:pointer;
  transition:width .25s ease,background .25s ease;
}
.day-card .gallery .dots .dot.active{background:#fff;width:22px;border-radius:6px}
.day-card .gallery .dots .dot:hover{background:rgba(255,255,255,.8)}
.day-card .gallery .dots .dot:focus-visible{outline:2px solid var(--shu);outline-offset:3px}

.day-card .body{padding:28px 32px}
@media (max-width:780px){.day-card .body{padding:22px 22px 26px}}

.day-card .day-tag{
  font-family:var(--display);font-style:italic;color:var(--shu);font-size:13px;letter-spacing:.18em;text-transform:uppercase
}
.day-card .day-tag .num{font-size:36px;font-style:normal;font-weight:700;color:var(--ink);margin-right:8px;letter-spacing:.02em;vertical-align:-4px}
.day-card .date{margin-top:2px;font-size:14px;color:var(--ink-mute);letter-spacing:.06em}
.day-card h3{
  font-family:var(--serif);font-weight:600;font-size:24px;margin:14px 0 8px;letter-spacing:.02em;color:var(--ink)
}
.day-card .tagline{color:var(--ink-soft);margin:0 0 16px;font-size:15px}

.day-card .attractions{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.day-card .attractions .pill{
  font-size:12.5px;padding:4px 10px;border:1px solid var(--line);border-radius:999px;
  color:var(--ink-soft);background:var(--washi);
}
.day-card .attractions .pill.star{border-color:var(--shu);color:var(--shu);background:rgba(26,109,124,.06)}

.day-card .meta-row{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px 18px;margin-top:14px;font-size:13.5px;color:var(--ink-soft);
  padding-top:14px;border-top:1px dashed var(--line)
}
.day-card .meta-row .item{display:flex;gap:8px;align-items:flex-start;min-width:0}
.day-card .meta-row .item .label{color:var(--ink-mute);font-size:11px;letter-spacing:.12em;text-transform:uppercase;flex-shrink:0;min-width:42px;margin-top:3px}
.day-card .meta-row .item .val{flex:1;min-width:0}
.day-card .meta-row .item .val .hi{color:var(--shu);font-weight:500}

/* ───── Full-bleed Day Sections (home) ───── */
.timeline-full{position:relative}
.day-section{
  min-height:100vh;display:grid;grid-template-columns:1fr 1fr;
  background:var(--paper);position:relative;scroll-margin-top:0;
}
.day-section:nth-child(even){background:var(--washi)}
.day-section:nth-child(even) .day-hero{order:2}
.day-section:nth-child(even) .day-content{order:1}
@media (max-width:900px){
  .day-section{grid-template-columns:1fr;min-height:auto}
  .day-section:nth-child(even) .day-hero{order:0}
  .day-section:nth-child(even) .day-content{order:0}
}

.day-hero{
  position:relative;min-height:60vh;overflow:hidden;background:var(--washi-deep);
}
@media (max-width:900px){.day-hero{min-height:48vh}}
.day-hero .slide{
  position:absolute;inset:0;background-size:cover;background-position:center;
  background-color:var(--washi-deep);opacity:0;transition:opacity .9s ease;
}
.day-hero .slide.active{opacity:1}
.day-hero .cap{
  position:absolute;left:20px;bottom:20px;z-index:2;
  padding:6px 14px;background:rgba(21,40,48,.65);color:#fff;
  font-size:13px;letter-spacing:.05em;border-radius:999px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  pointer-events:none;font-weight:500;
}
.day-hero .dots{
  position:absolute;right:20px;bottom:20px;z-index:2;display:flex;gap:6px;
}
.day-hero .dots .dot{
  width:8px;height:8px;border-radius:50%;border:none;padding:0;
  background:rgba(255,255,255,.45);cursor:pointer;
  transition:width .25s ease,background .25s ease;
}
.day-hero .dots .dot.active{background:#fff;width:22px;border-radius:6px}
.day-hero .dots .dot:hover{background:rgba(255,255,255,.8)}

.day-content{padding:64px 56px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
@media (max-width:900px){.day-content{padding:40px 22px}}
.day-content .day-num{
  font-family:var(--display);font-style:italic;color:var(--shu);
  font-size:13px;letter-spacing:.28em;text-transform:uppercase;margin-bottom:6px;
}
.day-content .day-num .num{font-size:42px;font-style:normal;font-weight:700;color:var(--ink);margin-right:10px;letter-spacing:.02em;vertical-align:-6px}
.day-content h2{
  font-family:var(--serif);font-weight:600;font-size:clamp(24px,3vw,32px);
  margin:0 0 8px;letter-spacing:.02em;color:var(--ink);
}
.day-content .date{color:var(--ink-mute);font-size:14px;letter-spacing:.06em;margin:0 0 4px}
.day-content .tagline{color:var(--ink-soft);font-size:15px;margin:14px 0 22px;line-height:1.7}
.day-content .md{padding:0;border:none;box-shadow:none;background:transparent}
.day-content .md h2{display:none}
.day-content .md table{font-size:12.5px}
.day-content .md .table-wrap{margin:12px 0}

/* ───── Progress Nav (scroll spy) ───── */
.progress-nav{
  position:fixed;right:28px;top:50%;transform:translateY(-50%);z-index:40;
  display:flex;flex-direction:column;gap:18px;
  padding:18px 12px;border-radius:999px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--line);
  box-shadow:var(--shadow-1);
  opacity:0;pointer-events:none;transition:opacity .4s ease;
}
.progress-nav.visible{opacity:1;pointer-events:auto}
.progress-nav::before{
  content:"";position:absolute;left:50%;top:24px;bottom:24px;width:1px;
  background:var(--line);transform:translateX(-50%);z-index:0;
}
.progress-nav .p-fill{
  position:absolute;left:50%;top:24px;width:1px;
  background:var(--shu);transform:translateX(-50%);z-index:0;
  height:0;transition:height .35s ease;
}
.progress-nav .p-dot{
  position:relative;z-index:1;
  width:34px;height:34px;border-radius:50%;border:1px solid var(--line);
  background:var(--paper);
  font-family:var(--display);font-style:italic;font-size:12px;font-weight:700;
  color:var(--ink-mute);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s ease;padding:0;letter-spacing:.02em;
}
.progress-nav .p-dot:hover{border-color:var(--shu);color:var(--shu)}
.progress-nav .p-dot.active{
  background:var(--shu);color:#fff;border-color:var(--shu);
  transform:scale(1.18);box-shadow:0 4px 14px rgba(26,109,124,.35);
}
@media (max-width:760px){
  .progress-nav{right:auto;left:50%;top:auto;bottom:18px;transform:translateX(-50%);
    flex-direction:row;gap:12px;padding:10px 16px;
  }
  .progress-nav::before{left:24px;right:24px;top:50%;bottom:auto;width:auto;height:1px;transform:translateY(-50%)}
  .progress-nav .p-fill{left:24px;right:auto;top:50%;width:0;height:1px;transform:translateY(-50%);transition:width .35s ease}
  .progress-nav .p-dot{width:30px;height:30px;font-size:11px}
}

/* ───── Restaurant Cards ───── */
.resto-section-title{font-family:var(--serif);font-weight:600;text-align:center;color:var(--ink);margin:0 0 22px;font-size:18px;letter-spacing:.04em}
.resto-section-title.upgrade{margin-top:56px;color:var(--kincha)}
.resto-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.resto-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-1);display:flex;flex-direction:column;transition:transform .3s ease, box-shadow .3s ease}
.resto-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-2)}
.resto-card .img{aspect-ratio:16/10;background:var(--washi-deep) center/cover no-repeat;position:relative}
.resto-card .img::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.42),transparent 55%);pointer-events:none}
.resto-card .badge{position:absolute;left:12px;bottom:12px;z-index:2;color:#fff;font-family:var(--display);font-style:italic;font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:4px 12px;background:rgba(26,109,124,.88);border-radius:999px;font-weight:600}
.resto-card.upgrade .badge{background:rgba(210,97,63,.88)}
.resto-card.low .badge{background:rgba(107,142,92,.88)}
.resto-card .body{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column;gap:6px}
.resto-card h4{margin:0;font-family:var(--serif);font-weight:600;font-size:17px;color:var(--ink);letter-spacing:.02em}
.resto-card .area{color:var(--ink-mute);font-size:12.5px;letter-spacing:.04em}
.resto-card .price{color:var(--shu);font-weight:600;font-size:13.5px;margin-top:2px}
.resto-card .desc{color:var(--ink-soft);font-size:13px;line-height:1.6;margin-top:4px;flex:1}
.resto-card .links{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.resto-card .links a{font-size:12px;padding:5px 11px;border-radius:999px;background:var(--washi);color:var(--shu);text-decoration:none;border:1px solid var(--line);transition:background .2s,color .2s}
.resto-card .links a:hover{background:var(--shu);color:#fff;border-color:var(--shu)}
details.md-detail{margin-top:48px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px}
details.md-detail summary{cursor:pointer;color:var(--ink-mute);font-size:13px;letter-spacing:.04em}
details.md-detail[open] summary{color:var(--shu);margin-bottom:14px}
details.md-detail .md{padding:0;border:none;box-shadow:none}

/* ───── Subpage MD content ───── */
.md{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:48px 56px;box-shadow:var(--shadow-1)}
@media (max-width:720px){.md{padding:28px 22px}}
.md > *:first-child{margin-top:0}
.md p{margin:1em 0;color:var(--ink-soft)}
.md h1{font-family:var(--serif);font-weight:600;font-size:28px;margin:0 0 18px;padding-bottom:14px;border-bottom:1px solid var(--line);letter-spacing:.02em}
.md h2{font-family:var(--serif);font-weight:600;font-size:22px;margin:40px 0 14px;padding-left:16px;position:relative;letter-spacing:.02em;scroll-margin-top:80px}
.md h2::before{content:"";position:absolute;left:0;top:.35em;bottom:.35em;width:3px;background:var(--shu);border-radius:2px}
.md h3{font-family:var(--serif);font-weight:500;font-size:17px;margin:28px 0 10px;color:var(--shu-deep);letter-spacing:.02em}
.md ul,.md ol{padding-left:22px;margin:1em 0}
.md li{margin:5px 0;color:var(--ink-soft)}
.md ul li::marker{color:var(--kincha)}
.md ol li::marker{color:var(--shu);font-family:var(--display)}
.md strong{color:var(--ink);font-weight:600}
.md em{color:var(--shu-deep)}
.md a{color:var(--shu);text-decoration:none;background-image:linear-gradient(var(--shu),var(--shu));background-size:100% 1px;background-position:0 100%;background-repeat:no-repeat;transition:background-size .2s ease,color .2s ease;padding:0 1px;cursor:pointer}
.md a:hover{color:var(--shu-deep);background-size:100% 2px}
.md a:focus-visible{outline:2px solid var(--shu);outline-offset:2px;border-radius:2px}
.md blockquote{margin:22px 0;padding:14px 20px;background:var(--washi);border-left:3px solid var(--kincha);border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--ink-soft);font-style:italic;font-size:14.5px}
.md blockquote p{margin:.3em 0}
.md hr{border:none;height:1px;background:var(--line);margin:40px auto;max-width:80px;position:relative}
.md hr::after{content:"❋";display:block;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--paper);padding:0 12px;color:var(--kincha);font-size:14px}
.md code{background:var(--washi);padding:2px 6px;border-radius:4px;font-size:.88em;color:var(--shu-deep);font-family:ui-monospace,"SF Mono",Menlo,monospace}
.md .table-wrap{overflow-x:auto;margin:16px 0;border-radius:var(--radius);border:1px solid var(--line)}
.md table{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--paper)}
.md thead th{background:var(--washi-deep);font-family:var(--serif);font-weight:600;color:var(--ink);text-align:left;padding:10px 12px;border-bottom:2px solid var(--shu);letter-spacing:.02em;font-size:12.5px}
.md tbody td{padding:10px 12px;border-bottom:1px solid var(--line-soft);vertical-align:top;color:var(--ink-soft)}
.md tbody tr:last-child td{border-bottom:none}
.md tbody tr:nth-child(even){background:#FCF9F2}
.md tbody tr:hover{background:var(--washi)}
.md tbody td strong{color:var(--ink)}

/* ───── Callouts ───── */
.callout{margin:20px 0;padding:14px 18px 14px 18px;border-radius:var(--radius);border:1px solid;display:grid;grid-template-columns:24px 1fr;gap:14px;align-items:flex-start}
.callout .ico{width:22px;height:22px;flex-shrink:0;margin-top:2px}
.callout .body > *:first-child{margin-top:0}
.callout .body > *:last-child{margin-bottom:0}

const imgCache = new Map();
const LANGS = ['en','zh'];

const CURATED = {};

async function summaryDirect(lang, title){
  try{
    const r = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
    if (!r.ok) return null;
    const j = await r.json();
    return (j.originalimage && j.originalimage.source) || (j.thumbnail && j.thumbnail.source) || null;
  }catch(e){ return null; }
}

async function openSearch(lang, query){
  try{
    const url = `https://${lang}.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=1&namespace=0&format=json&origin=*`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    return (j[1] && j[1][0]) || null;
  }catch(e){ return null; }
}

async function commonsImage(query){
  try{
    const sr = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srnamespace=6&srlimit=5&format=json&origin=*`);
    if (!sr.ok) return null;
    const sj = await sr.json();
    const hits = (sj.query && sj.query.search) || [];
    const file = hits.find(h => /\.(jpe?g|png|webp)$/i.test(h.title));
    if (!file) return null;
    const ir = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(file.title)}&prop=imageinfo&iiprop=url&iiurlwidth=1200&format=json&origin=*`);
    if (!ir.ok) return null;
    const ij = await ir.json();
    const pages = ij.query && ij.query.pages || {};
    const k = Object.keys(pages)[0];
    const info = pages[k] && pages[k].imageinfo && pages[k].imageinfo[0];
    return info ? (info.thumburl || info.url) : null;
  }catch(e){ return null; }
}

const PROXY_URL = 'https://script.google.com/macros/s/AKfycbxWB3owHPCyHtPeZpE4O45X9Gvzl3HOuHKRz5Km_sl4SyHW37t5N2W81gtLkClNi68e/exec';
const PROXY_TOKEN = 'ethan-sheet-9x7k2p';
async function pexelsImage(query){
  try{
    const url = `${PROXY_URL}?token=${PROXY_TOKEN}&action=pexels&q=${encodeURIComponent(query)}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    return (j && j.ok) ? j.src : null;
  }catch(e){ return null; }
}

async function openverseImage(query){
  try{
    const r = await fetch(`https://api.openverse.org/v1/images/?q=${encodeURIComponent(query)}&page_size=5&license_type=all`);
    if (!r.ok) return null;
    const j = await r.json();
    const hit = (j.results || []).find(x => x && (x.url || x.thumbnail));
    return hit ? (hit.url || hit.thumbnail) : null;
  }catch(e){ return null; }
}

// reject maps / coats of arms / flags / SVG diagrams
function isBadImage(src){
  if (!src) return true;
  const s = src.toLowerCase();
  return /locator|map_of|karte|carte|coat_of|seal_of|flag_of|emblem|escut|\.svg(\?|$)|wikipedia-logo/.test(s);
}

async function wikiImage(title){
  if (imgCache.has(title)) return imgCache.get(title);
  if (CURATED[title]){ imgCache.set(title, CURATED[title]); return CURATED[title]; }
  for (const lang of LANGS){
    const src = await summaryDirect(lang, title);
    if (src && !isBadImage(src)){ imgCache.set(title, src); return src; }
  }
  const q = title.replace(/_/g,' ');
  for (const lang of LANGS){
    const found = await openSearch(lang, q);
    if (found){
      const src = await summaryDirect(lang, found.replace(/ /g,'_'));
      if (src && !isBadImage(src)){ imgCache.set(title, src); return src; }
    }
  }
  imgCache.set(title, null);
  return null;
}

// Per-slide fetch: travel-focused Pexels first, dedupe globally
async function fetchSlideImage(item, used){
  const tries = [];
  if (item.q){
    tries.push(()=>pexelsImage(item.q));
    tries.push(()=>openverseImage(item.q));
    tries.push(()=>commonsImage(item.q));
  }
  if (item.wiki){
    tries.push(()=>wikiImage(item.wiki));
  }
  // last-ditch: pexels with stripped name
  if (item.name){
    tries.push(()=>pexelsImage(item.name + ' travel'));
  }
  for (const fn of tries){
    let src;
    try{ src = await fn(); }catch(e){ src = null; }
    if (!src || isBadImage(src)) continue;
    if (used && used.has(src)) continue;
    if (used) used.add(src);
    return src;
  }
  return null;
}

let _mdRaw = null;
async function getMd(){
  if (_mdRaw !== null) return _mdRaw;
  const r = await fetch('trip.md?_='+Date.now());
  if (!r.ok) throw new Error('無法讀取 trip.md');
  _mdRaw = await r.text();
  return _mdRaw;
}

const SECTIONS = {
  restaurants: ['🍽 推薦餐廳','⭐ 米其林'],
  booking: ['🎟 活動訂票'],
  transport: ['🚃 交通'],
  lodging: ['🏨 住宿周邊'],
  budget: ['💰 自費預算','💴 預算總表'],
  tips: ['⚠️ 備案','⚠ 備案'],
};

function extractSections(md, keywords){
  const parts = md.split(/^##\s+/m);
  const blocks = [];
  for (let i=1;i<parts.length;i++){
    const block = '## ' + parts[i];
    const firstLine = block.split('\n')[0];
    if (keywords.some(k => firstLine.includes(k.replace(/^[^一-龥\w]+/,'')) || firstLine.startsWith(k))){
      blocks.push(block.trim());
    }
  }
  return blocks.join('\n\n---\n\n');
}

marked.setOptions({ gfm:true, breaks:false });
const ICONS = {
  info:'<svg class="ico"><use href="#i-info"/></svg>',
  warning:'<svg class="ico"><use href="#i-warn"/></svg>',
  success:'<svg class="ico"><use href="#i-ok"/></svg>',
  danger:'<svg class="ico"><use href="#i-x"/></svg>'
};
function preprocessCallouts(md){
  md = md.replace(/^\[TOC\]\s*$/m,'');
  return md.replace(/:::(info|warning|success|danger)\s*\n([\s\S]*?):::/g,(_,type,body)=>{
    return `<div class="callout ${type}">${ICONS[type]}<div class="body">${marked.parse(body.trim())}</div></div>`;
  });
}
function slugify(t){return t.toString().trim().replace(/[^\p{Letter}\p{Number}]+/gu,'-').replace(/^-+|-+$/g,'').toLowerCase().slice(0,80)||'s'}
function renderMd(md){
  const renderer = new marked.Renderer();
  renderer.heading = (text, level) => `<h${level} id="${slugify(text)}">${text}</h${level}>`;
  return marked.parse(preprocessCallouts(md), { renderer });
}
function wrapTables(root){
  root.querySelectorAll('table').forEach(t=>{
    if (t.parentElement.classList.contains('table-wrap')) return;
    const w=document.createElement('div'); w.className='table-wrap';
    t.parentNode.insertBefore(w,t); w.appendChild(t);
  });
}

function dayCardHtml(d){
  const pills = d.attractions.map((a,i)=>`<span class="pill${i===0&&d.star?' star':''}">${a.name}</span>`).join('');
  const meals = Object.entries(d.meal||{}).map(([k,v])=>`<div class="item"><span class="label">${k}</span><span class="val">${v}</span></div>`).join('');
  const activity = d.activity ? `<div class="item"><span class="label">活動</span><span class="val"><span class="hi">${d.activity}</span></span></div>` : '';
  const hotel = `<div class="item"><span class="label">住宿</span><span class="val">${d.hotel}</span></div>`;
  const slides = d.attractions.map((a,i)=>`<div class="slide${i===0?' active':''}" data-day="${d.n}" data-idx="${i}" data-cap="${a.name}"></div>`).join('');
  const dots = d.attractions.length>1 ? `<div class="dots">${d.attractions.map((_,i)=>`<button class="dot${i===0?' active':''}" data-i="${i}" aria-label="圖片 ${i+1}"></button>`).join('')}</div>` : '';
  return `
    <article class="day-card" data-day="${d.n}">
      <div class="gallery">
        ${slides}
        <div class="cap">${d.attractions[0]?.name||''}</div>
        ${dots}
      </div>
      <div class="body">
        <div class="day-tag"><span class="num">${String(d.n).padStart(2,'0')}</span>Day ${d.n}</div>
        <div class="date">${d.date}</div>
        <h3>${d.title}</h3>
        <p class="tagline">${d.tagline}</p>
        <div class="attractions">${pills}</div>
        <div class="meta-row">
          ${meals}${activity}${hotel}
        </div>
      </div>
    </article>`;
}

async function paintDayImages(){
  const slides = [...document.querySelectorAll('.day-hero .slide[data-day], .day-card .gallery .slide[data-day]')];
  const used = new Set();
  for (const el of slides){
    const dn = parseInt(el.dataset.day), idx = parseInt(el.dataset.idx);
    const day = DAYS.find(x=>x.n===dn);
    const item = day && day.attractions[idx];
    if (!item) continue;
    const src = await fetchSlideImage(item, used);
    if (src) el.style.backgroundImage = `url(${src})`;
  }
  document.querySelectorAll('.day-section, .day-card').forEach(setupCarousel);
}

function setupCarousel(card){
  const scope = card.querySelector('.day-hero') || card.querySelector('.gallery') || card;
  const slides = [...scope.querySelectorAll('.slide')];
  const dots = [...scope.querySelectorAll('.dot')];
  const cap = scope.querySelector('.cap');
  if (slides.length < 2) return;
  let i = 0, timer = null;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const set = (n) => {
    i = (n + slides.length) % slides.length;
    slides.forEach((s,k)=>s.classList.toggle('active', k===i));
    dots.forEach((d,k)=>d.classList.toggle('active', k===i));
    if (cap) cap.textContent = slides[i].dataset.cap || '';
  };
  const next = () => set(i+1);
  const start = () => { if (!timer && !reduced) timer = setInterval(next, 4800); };
  const stop = () => { if (timer){ clearInterval(timer); timer = null; } };
  dots.forEach(d => d.addEventListener('click', () => { stop(); set(parseInt(d.dataset.i)); start(); }));
  card.addEventListener('mouseenter', stop);
  card.addEventListener('mouseleave', start);
  start();
}

function extractDaySection(md, dayN){
  const re = new RegExp(`^##\\s+📅\\s*Day\\s*${dayN}[\\s\\S]*?(?=^##\\s+|\\Z)`, 'm');
  const m = md.match(re);
  if (!m) return '';
  // strip the H2 line itself; tagline already shown above
  return m[0].replace(/^##[^\n]*\n/, '');
}

async function renderHome(){
  let md = '';
  try{ md = await getMd(); }catch(e){}
  const sections = DAYS.map(d=>{
    const slides = d.attractions.map((a,i)=>`<div class="slide${i===0?' active':''}" data-day="${d.n}" data-idx="${i}" data-cap="${a.name}"></div>`).join('');
    const dots = d.attractions.length>1 ? `<div class="dots">${d.attractions.map((_,i)=>`<button class="dot${i===0?' active':''}" data-i="${i}" aria-label="圖片 ${i+1}"></button>`).join('')}</div>` : '';
    const dayMdRaw = extractDaySection(md, d.n);
    const dayHtml = dayMdRaw ? renderMd(dayMdRaw) : '';
    return `
      <section class="day-section" id="day-${d.n}" data-day="${d.n}">
        <div class="day-hero">
          ${slides}
          <div class="cap">${d.attractions[0]?.name||''}</div>
          ${dots}
        </div>
        <div class="day-content">
          <div class="day-num"><span class="num">${String(d.n).padStart(2,'0')}</span>Day ${d.n}</div>
          <div class="date">${d.date}</div>
          <h2>${d.title}</h2>
          <p class="tagline">${d.tagline}</p>
          <div class="md">${dayHtml}</div>
        </div>
      </section>`;
  }).join('');
  return `
    ${renderHero()}
    <nav class="progress-nav" id="progress-nav" aria-label="Day progress">
      <div class="p-fill" id="p-fill"></div>
      ${DAYS.map(d=>`<button class="p-dot${d.n===1?' active':''}" data-day="${d.n}" aria-label="跳到 Day ${d.n}">${String(d.n).padStart(2,'0')}</button>`).join('')}
    </nav>
    <main class="timeline-full">${sections}</main>`;
}

function setupScrollSpy(){
  const nav = document.getElementById('progress-nav');
  const fill = document.getElementById('p-fill');
  if (!nav) return;
  const dots = [...nav.querySelectorAll('.p-dot')];
  const sections = DAYS.map(d=>document.getElementById(`day-${d.n}`)).filter(Boolean);
  if (!sections.length || !dots.length) return;

  dots.forEach(d=>{
    d.addEventListener('click', ()=>{
      const t = document.getElementById(`day-${d.dataset.day}`);
      if (t) t.scrollIntoView({behavior:'smooth', block:'start'});
    });
  });

  const setActive = (n)=>{
    dots.forEach(d=>d.classList.toggle('active', parseInt(d.dataset.day)===n));
    if (!fill || dots.length<2) return;
    const ratio = (n-1)/(dots.length-1);
    const isMobile = window.matchMedia('(max-width:760px)').matches;
    if (isMobile){
      const span = dots[dots.length-1].offsetLeft - dots[0].offsetLeft;
      fill.style.width = Math.max(0, span*ratio) + 'px';
    } else {
      const span = dots[dots.length-1].offsetTop - dots[0].offsetTop;
      fill.style.height = Math.max(0, span*ratio) + 'px';
    }
  };
  setActive(1);

  // Pick active day = section whose center is closest to viewport center
  const updateOnScroll = ()=>{
    const vc = window.innerHeight/2;
    let best = sections[0], bestDist = Infinity;
    for (const s of sections){
      const r = s.getBoundingClientRect();
      const c = r.top + r.height/2;
      const d = Math.abs(c - vc);
      if (d < bestDist){ bestDist = d; best = s; }
    }
    setActive(parseInt(best.dataset.day));
  };

  let ticking = false;
  const onScroll = ()=>{
    if (!ticking){
      window.requestAnimationFrame(()=>{ updateOnScroll(); ticking=false; });
      ticking = true;
    }
  };
  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('resize', onScroll);

  // Toggle nav visibility based on hero
  const heroEl = document.querySelector('.hero');
  if (heroEl && 'IntersectionObserver' in window){
    const heroObs = new IntersectionObserver((entries)=>{
      const ratio = entries[0].intersectionRatio;
      nav.classList.toggle('visible', ratio < 0.4);
    }, {threshold:[0, .4, .8, 1]});
    heroObs.observe(heroEl);
  } else {
    nav.classList.add('visible');
  }

  // initial paint
  updateOnScroll();
}

function restoCardHtml(r){
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(r.maps);
  const bookLink = r.book ? `<a href="${r.book}" target="_blank" rel="noopener">📅 訂位</a>` : '';
  return `
    <article class="resto-card ${r.tier}">
      <div class="img" data-pexels="${r.q}">
        <div class="badge">${r.tier==='upgrade'?'★ 升級':(r.tier==='low'?'低價位':'中價位')}</div>
      </div>
      <div class="body">
        <h4>${r.name}</h4>
        <div class="area">${r.area}</div>
        <div class="price">${r.price} · ${r.day}</div>
        <div class="desc">${r.desc}</div>
        <div class="links">
          <a href="${mapsUrl}" target="_blank" rel="noopener">📍 地圖</a>
          ${bookLink}
        </div>
      </div>
    </article>`;
}

async function paintRestoImages(){
  const els = [...document.querySelectorAll('.resto-card .img[data-pexels]')];
  // 跨卡去重：避免兩張卡共用同一張 Pexels 圖（check+add 在 await 後同步執行，無 race）
  const used = new Set();
  await Promise.all(els.map(async (el)=>{
    const q = el.dataset.pexels || '';
    const name = el.parentElement.querySelector('h4')?.textContent || '';
    // Multi-query fallback: every card gets SOME 且盡量不重複的圖
    const tries = [
      q,
      q + ' interior',
      q + ' food plate',
      name + ' restaurant',
      name + ' dining interior',
      'fine dining restaurant plate',
    ].filter(Boolean);
    for (const t of tries){
      const s = await pexelsImage(t);
      if (s && !isBadImage(s) && !used.has(s)){
        used.add(s);
        el.style.backgroundImage = `url(${s})`;
        return;
      }
    }
    // 退而求其次 openverse
    const ov = await openverseImage(q || name || 'restaurant interior');
    if (ov && !isBadImage(ov) && !used.has(ov)){
      used.add(ov);
      el.style.backgroundImage = `url(${ov})`;
      return;
    }
    // 最後兜底：寧可重複也別空白
    const last = await pexelsImage(q || name || 'restaurant');
    if (last && !isBadImage(last)){ el.style.backgroundImage = `url(${last})`; }
  }));
}

async function renderRestaurantsView(){
  const md = await getMd();
  const content = extractSections(md, SECTIONS.restaurants);

  const low = RESTAURANTS.filter(r=>r.tier==='low');

  const up = RESTAURANTS.filter(r=>r.tier==='upgrade');

    <section class="page route-view">
      <div class="wrap">
        <div class="head">
          <p class="kicker">— Restaurants —</p>
          <h2>餐廳清單</h2>
          <div class="rule"></div>
          <p class="desc">低價 / 中價 / 升級三層 · 評價皆 4.3★ 以上</p>
        </div>
        <h3 class="resto-section-title">🥗 低價位 AUD$20-40 / 人 (≈ NT$430-870)</h3>
        <div class="resto-grid">${low.map(restoCardHtml).join('')}</div>

        <div class="resto-grid">${mid.map(restoCardHtml).join('')}</div>
        <h3 class="resto-section-title upgrade">⭐ 升級備選 AUD$100+ / 人</h3>
        <div class="resto-grid">${up.map(restoCardHtml).join('')}</div>
        <details class="md-detail">
          <summary>展開完整資訊表 (markdown 表格 + 訂位優先順序)</summary>
          <div class="md">${mdHtml}</div>
        </details>
      </div>
    </section>`;
}

async function renderSubpage(keywords, title, kicker, desc){
  const md = await getMd();
  const content = extractSections(md, keywords);
  if (!content){
    return `<section class="page route-view"><div class="wrap"><div class="head"><p class="kicker">— ${kicker} —</p><h2>${title}</h2><div class="rule"></div></div><div class="md"><p>找不到對應內容。</p></div></div></section>`;
  }
  const html = renderMd(content);
  return `
    <section class="page route-view">
      <div class="wrap">
        <div class="head">
          <p class="kicker">— ${kicker} —</p>
          <h2>${title}</h2>
          <div class="rule"></div>
          ${desc?`<p class="desc">${desc}</p>`:''}
        </div>
        <div class="md" id="md-content">${html}</div>
      </div>
    </section>`;
}

const ROUTES = {
  '/':           { fn: ()=>renderHome(), title:'行程' },
  '/restaurants':{ fn: ()=>renderRestaurantsView(), title:'餐廳' },
  '/booking':    { fn: ()=>renderSubpage(SECTIONS.booking,'活動訂票','Booking','熱氣球 / Cook Island 浮潛 / Springbrook') },
  '/transport':  { fn: ()=>renderSubpage(SECTIONS.transport,'交通詳細','Transport','Go Card / G:Link 輕軌 / 右駕') },
  '/lodging':    { fn: ()=>renderSubpage(SECTIONS.lodging,'住宿周邊','Lodging','Novotel Surfers Paradise') },
  '/budget':     { fn: ()=>renderSubpage(SECTIONS.budget,'預算明細','Budget','自費 ＋ 預算總表') },
  '/tips':       { fn: ()=>renderSubpage(SECTIONS.tips,'備案 & Tips','Tips','ETA 簽證、防曬、退稅、右駕、紅眼') },
};

async function navigate(){
  const hash = location.hash.replace(/^#/,'') || '/';
  const route = ROUTES[hash] || ROUTES['/'];
  document.querySelectorAll('nav.top .links a').forEach(a=>{
    a.classList.toggle('active', a.dataset.route === hash);
  });
  const view = document.getElementById('view');
  view.innerHTML = `<div class="loading"><div class="spin"></div><div>讀取中…</div></div>`;
  try{
    view.innerHTML = await route.fn();
    if (hash === '/'){
      paintHeroBg();
      paintDayImages();
      wrapTables(view);
      setupScrollSpy();
    } else {
      wrapTables(view);
      if (hash === '/restaurants') paintRestoImages();
    }
    window.scrollTo({top:0,behavior:'instant'});
  }catch(err){
    view.innerHTML = `<section class="page"><div class="wrap"><div class="callout danger"><svg class="ico"><use href="#i-x"/></svg><div class="body"><strong>載入失敗</strong><p>${err.message}</p></div></div></div></section>`;
  }
}
window.addEventListener('hashchange', navigate);
navigate();
